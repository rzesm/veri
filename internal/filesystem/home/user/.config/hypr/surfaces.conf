##########################
### WINDOWS AND LAYERS ###
##########################

layerrule = animation fade, match:namespace wallpaper
layerrule = animation fade, blur on, ignore_alpha 0.1, match:namespace waybar
layerrule = blur on, ignore_alpha 0, dim_around on, match:namespace rofi
layerrule = animation fade, blur on, match:namespace hyprexpose
layerrule = blur on, ignore_alpha 0, match:namespace notifications
layerrule = no_anim on, match:namespace wayfreeze
layerrule = no_anim on, match:namespace selection
layerrule = no_anim on, match:namespace hyprpicker

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# xdg-desktop-portal-gtk
windowrule = match:class xdg-desktop-portal-gtk, float on, size 600 400

# xdg-desktop-portal-hyprland
windowrule = match:class hyprland-share-picker, float on, size 500 290

# Waybar widgets

    # Adwifi
    windowrule = match:class (rzes.adwifi), animation slide, float on, pin on, size 600 400, move monitor_w*0.5-300 40
                                                      
    # pwvucontrol                                      
    windowrule = match:class (com.saivert.pwvucontrol), animation slide, float on, pin on, size 900 600, move monitor_w*0.5-450 40
                                                       
    # Adwaita Bluetooth
    windowrule = match:class (com.ezratweaver.AdwBluetooth), match:title (Bluetooth), animation slide, float on, pin on, size 600 400, move monitor_w*0.5-300 40
    # This fixes a weird glitch that is beyond my comprehension
    windowrule = match:class (com.ezratweaver.AdwBluetooth), match:title (com.ezratweaver.AdwBluetooth), float on, pin on, size window_w-20 window_h-20, move monitor_w*0.5-(window_w-20)*0.5 monitor_h*0.5-(window_h-20)*0.5 
                                                       
    # Power menu
    windowrule = match:class (yad.power), animation slide, float on, pin on, size 300 50, move monitor_w*0.5-150 40,

    # Charge limit menu
    windowrule = match:class (yad.charge), animation slide, float on, pin on, size 250 129, move 5 40,

    # Calendar
    windowrule = match:class (yad.calendar), animation slide, float on, pin on, size 338 233, move monitor_w-344 40,

    # btop
    windowrule = match:class (btop), animation slide, float on, pin on, size 900 620, move monitor_w*0.5-450 monitor_h-620-5

# Clipse
windowrule = match:class (clipse-gui), float on, size 460 500, move cursor_x-230 cursor_y-250
windowrule = match:class (clipse-gui), match:title (Keyboard Shortcuts), float on, size 634 500, move cursor_x-317 cursor_y-250

# Unicode
windowrule = match:class (unicode-input), float on, size 490 360, move cursor_x-245 cursor_y-180

# Qalculate
windowrule = match:class (qalculate-gtk), float on, size 415 265, move cursor_x-208 cursor_y-133

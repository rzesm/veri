################################
### KEYBINDINGS AND GESTURES ###
################################

# General

bind = SUPER, U, exec, ~/.config/hypr/scripts/toggle_ui.sh
bind = SUPER, W, exec, ~/.config/hypr/scripts/toggle_overview.sh
bind = SUPER, Z, exec, ~/.config/hypr/scripts/zoom.sh

bind = SUPER, PRINT, exec, ~/.config/hypr/scripts/screenshot_screen.sh
bind = SUPER, S, exec, ~/.config/hypr/scripts/screenshot_region.sh
bind = SUPER SHIFT, S, exec, ~/.config/hypr/scripts/screenshot_interactive.sh

# Apps

bind = SUPER, C, exec, foot
bind = SUPER, Q, exec, pkill --exact rofi || hyprctl dispatch killactive
bind = SUPER, E, exec, nautilus -w
bind = SUPER, Space, exec, pkill --exact rofi || rofi -show drun
bind = SUPER, I, exec, foot --app-id=neovim nvim
bind = SUPER, T, exec, foot --app-id=btop btop
bind = SUPER, B, exec, zen-browser
bind = SUPER, V, exec, pkill clipse || foot --title "Clipboard" --app-id clipse sh -c "clipse"
bind = SUPER, Period, exec, pkill unipicker || foot --title "Unicode picker" --app-id unicode-input sh -c "unipicker --copy-command \"wl-copy -n --type text/plain;charset=utf-8\""

# Windows

bind = SUPER, F, fullscreen,
bind = SUPER, X, exec, ~/.config/hypr/scripts/toggle_floating.sh

bind = SUPER, Left, movefocus, l
bind = SUPER, Right, movefocus, r
bind = SUPER, Up, movefocus, u
bind = SUPER, Down, movefocus, d
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

bind = SUPER SHIFT, H, swapwindow, l
bind = SUPER SHIFT, L, swapwindow, r
bind = SUPER SHIFT, K, swapwindow, u
bind = SUPER SHIFT, J, swapwindow, d
bind = SUPER SHIFT, Left, swapwindow, l
bind = SUPER SHIFT, Right, swapwindow, r
bind = SUPER SHIFT, Up, swapwindow, u
bind = SUPER SHIFT, Down, swapwindow, d

binde = SUPER ALT, H, resizeactive, -50 0
binde = SUPER ALT, L, resizeactive, 50 0
binde = SUPER ALT, K, resizeactive, 0 -50
binde = SUPER ALT, J, resizeactive, 0 50
binde = SUPER ALT, Left, resizeactive, -50 0
binde = SUPER ALT, Right, resizeactive, 50 0
binde = SUPER ALT, Up, resizeactive, 0 -50
binde = SUPER ALT, Down, resizeactive, 0 50

bind = SUPER, P, layoutmsg, swapsplit
bind = SUPER, O, layoutmsg, togglesplit

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Workspaces

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER, A, workspace, -1
bind = SUPER, D, workspace, +1

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10
bind = SUPER SHIFT, A, movetoworkspace, -1
bind = SUPER SHIFT, D, movetoworkspace, +1

# Function keys

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 4%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 4%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5-

# Copilot key

bind = SUPER SHIFT, F23, exec, hyprctl keyword cursor:invisible true && ~/.config/hypr/scripts/touchpad_control.sh
bindr = SUPER SHIFT, F23, exec, hyprctl keyword cursor:invisible false && pkill -SIGTERM -f ~/.config/hypr/scripts/touchpad_control.sh

gesture = 3, horizontal, workspace
gesture = 3, up, fullscreen
gesture = 3, down, dispatcher, exec, ~/.config/hypr/scripts/toggle_overview.sh

# Laptop lid (it's a bind lmao)
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch notify-send meow

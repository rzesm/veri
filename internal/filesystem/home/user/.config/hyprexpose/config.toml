# hyprexpose example configuration
# Copy to ~/.config/hyprexpose/config.toml and edit as needed.
# All keys are optional — omitted keys fall back to the defaults shown here.

# ── Appearance ────────────────────────────────────────────────────────────────

[appearance]

# Font used for window class / title labels inside each card.
font = "System-ui 0"

# Font used for workspace number / name labels at the top of each card.
label_font = "System-ui 12"

# Gap between workspace cards, and between cards and the screen edge (px).
card_padding = 10.0

# Corner radius of workspace cards (px).
card_radius = 10.0

# Maximum card width and height (px). Cards shrink to fit the screen but
# never grow beyond these values.
max_card_width  = 99999.0
max_card_height = 99999.0

# Height reserved for the workspace label at the top of each card (px).
label_height = 0.0

# Padding between a card's edge and the window thumbnail area (px).
thumb_padding = 0.0

# Width of the selection highlight border drawn around the active card (px).
select_border = 1.0

# ── Colors ────────────────────────────────────────────────────────────────────
# Colors can be written as:
#   "#rrggbb"   — hex RGB, fully opaque
#   "#rrggbbaa" — hex RGBA (aa = alpha, ff = opaque, 80 = 50% transparent)
#   [r, g, b, a] — float array, each value in 0.0–1.0

[colors]

# Full-screen dim overlay drawn behind all workspace cards.
background = "#00000000"

# Workspace card background fill.
card = "#00000055"

# Border drawn around the currently selected card.
selection = "#ffffff33"

# Workspace number / name label text.
label = "#00000000"

# "(empty)" text shown in workspaces with no windows.
empty_label = "#80808094"

# Window class / title text drawn over thumbnails or placeholder rects.
window_label = "#ffffffe6"

# Coloured border drawn around the window that will be moved when you press 'm'.
# Set the alpha to 00 to disable the indicator entirely.
active_window = "#ffffff33"

# ── Behavior ──────────────────────────────────────────────────────────────────

[behavior]

# Skip capturing live window thumbnails. Workspaces will show coloured
# placeholder rectangles instead. Faster to open and uses less memory.
no_preview = false

# After pressing 'm' to move the active window to another workspace,
# also switch to that workspace (and close the overlay).
# Set to false to move silently and stay on the current workspace.
switch_on_move = false
